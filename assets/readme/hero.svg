<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">News Agent Hero</title>
  <desc id="desc">AI-Powered News Aggregator and RSS Feed Generator</desc>
  
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0D111A" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- Background Card Container -->
  <rect width="1200" height="380" rx="24" fill="url(#bg-grad)" stroke="#1E293B" stroke-width="2"/>
  
  <!-- Top Ambient Glow Line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Subtle Decorative Grid Pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
    <line x1="500" y1="0" x2="500" y2="380"/>
    <line x1="700" y1="0" x2="700" y2="380"/>
    <line x1="900" y1="0" x2="900" y2="380"/>
    <line x1="1100" y1="0" x2="1100" y2="380"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
  </g>

  <!-- Left Column: Branding & Copy (Constrained within x=50..620) -->
  <g transform="translate(50, 48)">
    <!-- Category Pill Badge -->
    <rect width="230" height="30" rx="15" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="16" cy="15" r="4" fill="#10B981"/>
    <text x="28" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif" font-size="12" font-weight="700" fill="#A78BFA" letter-spacing="1.2">NEWS INTELLIGENCE ENGINE</text>

    <!-- Main Title -->
    <text x="0" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif" font-size="52" font-weight="900" fill="#F8FAFC" letter-spacing="-1">News Agent <tspan fill="#F97316">📰</tspan></text>

    <!-- Subtitle / Tagline (Split lines to prevent overflow) -->
    <text x="0" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif" font-size="19" font-weight="600" fill="#CBD5E1">AI-Powered News Aggregator &amp; RSS Hub</text>
    <text x="0" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif" font-size="15" font-weight="400" fill="#94A3B8">基于 GitHub Actions 定时调度 + Gemini AI 智能筛选</text>
    <text x="0" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif" font-size="15" font-weight="400" fill="#94A3B8">全自动生成符合 W3C 标准的多分类新闻订阅源系统</text>

    <!-- Highlights Badges Row -->
    <g transform="translate(0, 204)">
      <!-- Badge 1: Gemini AI -->
      <rect width="160" height="36" rx="10" fill="#1E1B4B" stroke="#6366F1" stroke-width="1.2"/>
      <path d="M16 18 L19 11 L22 18 L29 21 L22 24 L19 31 L16 24 L9 21 Z" fill="#818CF8"/>
      <text x="34" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#E0E7FF">Gemini AI Filter</text>

      <!-- Badge 2: GitHub Actions -->
      <g transform="translate(172, 0)">
        <rect width="175" height="36" rx="10" fill="#0F172A" stroke="#38BDF8" stroke-width="1.2"/>
        <circle cx="18" cy="18" r="5" fill="#38BDF8"/>
        <text x="32" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#E0F2FE">3x Daily Automation</text>
      </g>

      <!-- Badge 3: RSS 2.0 Standard -->
      <g transform="translate(359, 0)">
        <rect width="155" height="36" rx="10" fill="#2A1205" stroke="#F97316" stroke-width="1.2"/>
        <path d="M14 24 A7 7 0 0 1 21 17 M14 20 A3 3 0 0 1 17 17 M14 24 A0 0 0 0 1 14 24" stroke="#FB923C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <circle cx="14.5" cy="23.5" r="1.2" fill="#FB923C"/>
        <text x="30" y="23" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#FFEDD5">W3C RSS 2.0</text>
      </g>
    </g>
  </g>

  <!-- Right Column: Visual Pipeline Card (Starts at x=650, width=500) -->
  <g transform="translate(650, 42)">
    <rect width="500" height="296" rx="16" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>

    <!-- Terminal Header Bar -->
    <rect width="500" height="36" rx="16" fill="#0F172A"/>
    <rect y="20" width="500" height="16" fill="#0F172A"/>
    <circle cx="20" cy="18" r="5" fill="#EF4444"/>
    <circle cx="36" cy="18" r="5" fill="#F59E0B"/>
    <circle cx="52" cy="18" r="5" fill="#10B981"/>
    <text x="250" y="22" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748B" text-anchor="middle">pipeline_workflow.py — ACTIVE</text>

    <!-- Pipeline Content Nodes -->
    <!-- Node 1: RSS Sources -->
    <g transform="translate(20, 56)">
      <rect width="460" height="54" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="28" cy="27" r="12" fill="#F97316" fill-opacity="0.2"/>
      <text x="28" y="32" font-family="sans-serif" font-size="12" text-anchor="middle">📡</text>
      <text x="50" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#F8FAFC">Multi-Source RSS Aggregator</text>
      <text x="50" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94A3B8">Tech / AI / Finance Feeds Fetching</text>
      <rect x="380" y="17" width="64" height="20" rx="10" fill="#10B981" fill-opacity="0.2"/>
      <text x="412" y="31" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#34D399" text-anchor="middle">FETCH</text>
    </g>

    <!-- Connector Line 1 -->
    <line x1="250" y1="110" x2="250" y2="126" stroke="#6366F1" stroke-width="2" stroke-dasharray="3 3"/>
    <polygon points="250,130 246,123 254,123" fill="#6366F1"/>

    <!-- Node 2: Deduplication & AI Filtering -->
    <g transform="translate(20, 132)">
      <rect width="460" height="54" rx="10" fill="#1E1B4B" stroke="#6366F1" stroke-width="1.2"/>
      <circle cx="28" cy="27" r="12" fill="#818CF8" fill-opacity="0.2"/>
      <text x="28" y="32" font-family="sans-serif" font-size="12" text-anchor="middle">🤖</text>
      <text x="50" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#F8FAFC">Fingerprint &amp; Gemini AI Filter</text>
      <text x="50" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#A5B4FC">Deduplicate + Smart High-Quality Scoring</text>
      <rect x="380" y="17" width="64" height="20" rx="10" fill="#818CF8" fill-opacity="0.2"/>
      <text x="412" y="31" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#A5B4FC" text-anchor="middle">FILTER</text>
    </g>

    <!-- Connector Line 2 -->
    <line x1="250" y1="186" x2="250" y2="202" stroke="#10B981" stroke-width="2" stroke-dasharray="3 3"/>
    <polygon points="250,206 246,199 254,199" fill="#10B981"/>

    <!-- Node 3: RSS Feed & Portal Output -->
    <g transform="translate(20, 208)">
      <rect width="460" height="54" rx="10" fill="#064E3B" fill-opacity="0.4" stroke="#10B981" stroke-width="1.2"/>
      <circle cx="28" cy="27" r="12" fill="#34D399" fill-opacity="0.2"/>
      <text x="28" y="32" font-family="sans-serif" font-size="12" text-anchor="middle">🌐</text>
      <text x="50" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#F8FAFC">RSS 2.0 Feeds &amp; Web Portal</text>
      <text x="50" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6EE7B7">Auto-Deploy to GitHub Pages</text>
      <rect x="380" y="17" width="64" height="20" rx="10" fill="#34D399" fill-opacity="0.2"/>
      <text x="412" y="31" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#6EE7B7" text-anchor="middle">DEPLOY</text>
    </g>
  </g>
</svg>
